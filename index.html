<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="style.css">
        
        <title>Document</title>
       
    </head>
    <body>
        <div class='btn-add '>
            <button >Add Board</button>
        </div>

        <div class="popUpContainer">
            <div class="popUp">
                    <div class="popup-div" id='name-container'>
                        <input type="text", id='title' class='popup-elem' placeholder="Title">
                    </div>
                 
                    <div class="popup-div" id='message-container' >
                        <textarea name="" id="message" class='popup-elem' rows="5",
                         placeholder="What's on your mind?"></textarea> 
                    </div>
                    <div class='popup-div'>
                        <button type='button' id='bnt-send'>Send</button>
                    </div>

            </div>
        </div>


       
        <script type='module' src="script.js"></script>
        
    </body>
   

    </html>
